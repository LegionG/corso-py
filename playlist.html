<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlist</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            padding: 30px;
        }
        .container {
            max-width: 1000px;
            margin: auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.5rem;
        }
        .btn-back {
            background: #666;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn-back:hover {
            background: #888;
        }

        /* Vista Lista */
        .lista-view {
            display: block;
        }
        .lista-view.hidden {
            display: none;
        }
        .btn-new-playlist {
            background: #ff4757;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            margin-bottom: 30px;
        }
        .btn-new-playlist:hover {
            background: #ff6b81;
        }
        .playlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .playlist-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .playlist-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
            background: rgba(255, 255, 255, 0.15);
        }
        .playlist-card h3 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
        .playlist-card p {
            color: #ddd;
            font-size: 0.9rem;
        }

        /* Vista Dettaglio */
        .dettaglio-view {
            display: none;
        }
        .dettaglio-view.active {
            display: block;
        }
        .dettaglio-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .dettaglio-header h2 {
            font-size: 2rem;
        }
        .btn-delete-playlist {
            background: #ff4757;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
        }
        .btn-delete-playlist:hover {
            background: #ff6b81;
        }

        .form-add-film {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .form-add-film h3 {
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
        }
        .btn-submit {
            background: #ff4757;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-submit:hover {
            background: #ff6b81;
        }

        .section-title {
            font-size: 1.5rem;
            margin: 30px 0 20px;
            border-bottom: 2px solid #ff4757;
            padding-bottom: 10px;
        }

        .film-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .film-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
            position: relative;
        }
        .film-item img {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .film-item h4 {
            margin-bottom: 5px;
        }
        .btn-remove-film {
            background: #ff4757;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn-remove-film:hover {
            background: #ff6b81;
        }
        .empty-message {
            text-align: center;
            color: #bbb;
            padding: 40px;
        }

        .form-add-manual {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .form-add-manual h4 {
            margin-bottom: 15px;
            color: #ff4757;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- VISTA LISTA PLAYLIST -->
        <div class="lista-view active" id="lista-view">
            <div class="header">
                <h1>📋 Le Mie Playlist</h1>
                <button class="btn-back" onclick="window.location.href='index_progetto.html'">← Torna a Film</button>
            </div>
            
            <button class="btn-new-playlist" onclick="mostraFormNuovaPlaylist()">+ Crea Nuova Playlist</button>

            <div id="form-nuova-playlist" style="display: none; background: rgba(255,255,255,0.1); border-radius: 15px; padding: 25px; margin-bottom: 30px; border: 1px solid rgba(255,255,255,0.2);">
                <h3>Crea Nuova Playlist</h3>
                <div class="form-group" style="margin-top: 15px;">
                    <label for="titolo-playlist">Nome Playlist:</label>
                    <input type="text" id="titolo-playlist" placeholder="Es. Film Fantascienza...">
                </div>
                <button class="btn-submit" onclick="creaPlaylist()">Crea</button>
            </div>

            <div id="playlist-grid" class="playlist-grid"></div>
        </div>

        <!-- VISTA DETTAGLIO PLAYLIST -->
        <div class="dettaglio-view" id="dettaglio-view">
            <div class="dettaglio-header">
                <div>
                    <button class="btn-back" onclick="tornaAllaLista()">← Torna indietro</button>
                    <h2 id="playlist-title" style="margin-top: 15px;"></h2>
                </div>
                <button class="btn-delete-playlist" onclick="eliminaPlaylist()">🗑 Elimina Playlist</button>
            </div>

            <div class="form-add-film">
                <h3>Aggiungi Film</h3>
                <div class="form-group">
                    <label for="ricerca-film">Cerca film nel database:</label>
                    <input type="text" id="ricerca-film" placeholder="Titolo film...">
                </div>
                <div id="risultati-ricerca" style="margin-top: 15px;"></div>

                <div class="form-add-manual">
                    <h4>Aggiungi Film Manualmente</h4>
                    <div class="form-group" style="margin-top: 15px;">
                        <label for="titolo-film-manual">Titolo:</label>
                        <input type="text" id="titolo-film-manual" placeholder="Titolo film">
                    </div>
                    <div class="form-group">
                        <label for="trama-film-manual">Trama:</label>
                        <input type="text" id="trama-film-manual" placeholder="Trama">
                    </div>
                    <div class="form-group">
                        <label for="anno-film-manual">Anno:</label>
                        <input type="number" id="anno-film-manual" placeholder="2024">
                    </div>
                    <div class="form-group">
                        <label for="locandina-film-manual">URL Locandina:</label>
                        <input type="text" id="locandina-film-manual" placeholder="https://...">
                    </div>
                    <button class="btn-submit" onclick="aggiungiFilmManuale()">Aggiungi Film</button>
                </div>
            </div>

            <h3 class="section-title">Film nella Playlist</h3>
            <div id="film-playlist-list" class="film-list"></div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8000";
        let playlistCorrente = null;

        // Carica lista playlist
        async function caricaPlaylist() {
            try {
                let risposta = await fetch(API_URL + "/playlist");
                let playlist = await risposta.json();

                let grid = document.getElementById("playlist-grid");
                grid.innerHTML = "";

                if (!playlist || playlist.length === 0) {
                    grid.innerHTML = "<p class='empty-message' style='grid-column: 1/-1;'>Nessuna playlist ancora</p>";
                    return;
                }

                playlist.forEach(p => {
                    let div = document.createElement("div");
                    div.className = "playlist-card";
                    div.innerHTML = `
                        <h3>${p.titolo_playlist}</h3>
                        <p>ID: ${p.id}</p>
                    `;
                    div.onclick = () => apriPlaylist(p.id, p.titolo_playlist);
                    grid.appendChild(div);
                });
            } catch (e) {
                console.error("Errore:", e);
            }
        }

        function mostraFormNuovaPlaylist() {
            let form = document.getElementById("form-nuova-playlist");
            form.style.display = form.style.display === "none" ? "block" : "none";
        }

        async function creaPlaylist() {
            let titolo = document.getElementById("titolo-playlist").value;

            if (!titolo.trim()) {
                alert("Inserisci un nome per la playlist");
                return;
            }

            try {
                let risposta = await fetch(API_URL + "/playlist", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ titolo_playlist: titolo })
                });

                if (risposta.ok) {
                    document.getElementById("titolo-playlist").value = "";
                    document.getElementById("form-nuova-playlist").style.display = "none";
                    caricaPlaylist();
                }
            } catch (e) {
                console.error("Errore:", e);
            }
        }

        function apriPlaylist(id, titolo) {
            playlistCorrente = id;
            document.getElementById("lista-view").classList.remove("active");
            document.getElementById("dettaglio-view").classList.add("active");
            document.getElementById("playlist-title").innerText = titolo;
            caricaFilmPlaylist();
        }

        function tornaAllaLista() {
            document.getElementById("lista-view").classList.add("active");
            document.getElementById("dettaglio-view").classList.remove("active");
            caricaPlaylist();
        }

        async function caricaFilmPlaylist() {
            try {
                let risposta = await fetch(API_URL + "/playlist/" + playlistCorrente + "/film");
                let film = await risposta.json();

                let lista = document.getElementById("film-playlist-list");
                lista.innerHTML = "";

                if (!film || film.length === 0) {
                    lista.innerHTML = "<p class='empty-message' style='grid-column: 1/-1;'>Nessun film in questa playlist</p>";
                    return;
                }

                film.forEach(f => {
                    let div = document.createElement("div");
                    div.className = "film-item";
                    div.innerHTML = `
                        <img src="${f.url_locandina}" alt="${f.titolo}">
                        <h4>${f.titolo}</h4>
                        <p>${f.anno}</p>
                        <button class="btn-remove-film" onclick="rimuoviFilmPlaylist(${f.film_id})">Rimuovi</button>
                    `;
                    lista.appendChild(div);
                });
            } catch (e) {
                console.error("Errore:", e);
            }
        }

        async function ricercaFilm() {
            let keyword = document.getElementById("ricerca-film").value;

            if (!keyword.trim()) {
                document.getElementById("risultati-ricerca").innerHTML = "";
                return;
            }

            try {
                let risposta = await fetch(API_URL + "/film/cerca?keyword=" + encodeURIComponent(keyword));
                let film = await risposta.json();

                let div = document.getElementById("risultati-ricerca");
                div.innerHTML = "";

                if (!film || film.length === 0) {
                    div.innerHTML = "<p style='color: #bbb;'>Nessun film trovato</p>";
                    return;
                }

                film.forEach(f => {
                    let card = document.createElement("div");
                    card.style.cssText = "background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;";
                    card.innerHTML = `
                        <span>${f.titolo} (${f.anno})</span>
                        <button class="btn-submit" style="padding: 6px 15px; font-size: 0.9rem;" onclick="aggiungiFilmPlaylist(${f.id})">Aggiungi</button>
                    `;
                    div.appendChild(card);
                });
            } catch (e) {
                console.error("Errore:", e);
            }
        }

        async function aggiungiFilmPlaylist(filmId) {
            try {
                let risposta = await fetch(API_URL + "/playlist/" + playlistCorrente + "/film", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ film_id: filmId })
                });

                if (risposta.ok) {
                    document.getElementById("ricerca-film").value = "";
                    document.getElementById("risultati-ricerca").innerHTML = "";
                    caricaFilmPlaylist();
                }
            } catch (e) {
                console.error("Errore:", e);
            }
        }

        async function aggiungiFilmManuale() {
            let titolo = document.getElementById("titolo-film-manual").value;
            let trama = document.getElementById("trama-film-manual").value;
            let anno = document.getElementById("anno-film-manual").value;
            let locandina = document.getElementById("locandina-film-manual").value;

            if (!titolo.trim()) {
                alert("Inserisci almeno il titolo");
                return;
            }

            try {
                // Prima crea il film nel DB
                let risposta = await fetch(API_URL + "/film/aggiungi", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        titolo: titolo,
                        trama: trama || "",
                        anno: parseInt(anno) || 0,
                        url_locandina: locandina || "",
                        tmdb_id: ""
                    })
                });

                let datiFilm = await risposta.json();

                // Poi lo aggiunge alla playlist
                await fetch(API_URL + "/playlist/" + playlistCorrente + "/film", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ film_id: datiFilm.id })
                });

                document.getElementById("titolo-film-manual").value = "";
                document.getElementById("trama-film-manual").value = "";
                document.getElementById("anno-film-manual").value = "";
                document.getElementById("locandina-film-manual").value = "";
                caricaFilmPlaylist();
            } catch (e) {
                console.error("Errore:", e);
            }
        }

        async function rimuoviFilmPlaylist(filmId) {
            if (confirm("Rimuovere questo film dalla playlist?")) {
                try {
                    await fetch(API_URL + "/playlist/" + playlistCorrente + "/film/" + filmId, {
                        method: "DELETE"
                    });
                    caricaFilmPlaylist();
                } catch (e) {
                    console.error("Errore:", e);
                }
            }
        }

        async function eliminaPlaylist() {
            if (confirm("Eliminare questa playlist? Questa azione non può essere annullata.")) {
                try {
                    await fetch(API_URL + "/playlist/" + playlistCorrente, {
                        method: "DELETE"
                    });
                    tornaAllaLista();
                } catch (e) {
                    console.error("Errore:", e);
                }
            }
        }

        // Event listener per ricerca in tempo reale
        document.addEventListener("DOMContentLoaded", function() {
            caricaPlaylist();
            document.getElementById("ricerca-film").addEventListener("keyup", ricercaFilm);
        });
    </script>
</body>
</html>
