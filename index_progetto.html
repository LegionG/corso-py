<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineManiaci</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            min-height: 100vh;
            padding: 30px;
        }

        .container {
            max-width: 1100px;
            margin: auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 3rem;
        }

        .search-box {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
        }

        input {
            width: 400px;
            padding: 12px 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
        }

        button {
            background: #ff4757;
            color: white;
            border: none;
            padding: 12px 22px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.3s;
        }

        button:hover {
            background: #ff6b81;
        }

        #risultati {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
        }

        .film-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            text-align: center;
            padding-bottom: 15px;
            transition: 0.3s;
        }

        .film-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.4);
        }

        .film-card img {
            width: 100%;
            height: 380px;
            object-fit: cover;
        }

        .film-card h3 {
            margin: 15px 10px 5px;
        }

        .film-card p {
            color: #ddd;
        }

        .film-card img {
            width: 100%;
            height: 380px;
            object-fit: cover;
            border-radius: 15px 15px 0 0;
        }

        .film-card img {
            transition: transform 0.3s ease;
        }

        .film-card:hover img {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🎬 CineManiaci</h1>

        <div class="search-box">
            <input type="text" id="campoCerca" placeholder="Cerca un film...">
            <button onclick="avviaRicerca()">Cerca</button>
        </div>

        <div id="risultati"></div>
    </div>

    <script>
        const API_URL = "https://friendly-invention-9rwvwjr9g6wh6w7-8000.app.github.dev";

        window.onload = async function() {
            let risposta = await fetch(API_URL + "/film");
            let dati = await risposta.json();
            let lista = document.getElementById("risultati");
            lista.innerHTML = "";

            dati.forEach(p => {
                let div = document.createElement("div");
                div.className = "film-card";
                div.onclick = function() {
                window.location.href = "film/" + p.id;
};

                div.innerHTML = `
                    <img src="${p.url_locandina}" alt="${p.titolo}">
                    <h3>${p.titolo}</h3>
                    <p>📅 ${p.anno}</p>
`;


                lista.appendChild(div);
            });
        };
        
        async function avviaRicerca() {
            let testo = document.getElementById("campoCerca").value;
            let risposta = await fetch(API_URL + "/film/cerca?keyword=" + testo);

            let dati = await risposta.json();

            let lista = document.getElementById("risultati");
            lista.innerHTML = "";

            dati.forEach(p => {
                let div = document.createElement("div");
                div.className = "film-card";

                div.innerHTML = `
    <img src="${p.url_locandina}" alt="${p.titolo}">
    <h3>${p.titolo}</h3>
    <p>📅 ${p.anno}</p>
`;


                lista.appendChild(div);
            });
        }
    </script>

</body>

</html>
